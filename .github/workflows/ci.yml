name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: xcode-27
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcrun --sdk macosx --show-sdk-version
      - name: Build
        run: ./script/ci.sh
